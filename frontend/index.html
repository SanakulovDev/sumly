<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#059669" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Sumly — Track income & expenses</title>
    <script>
      // Apply the saved theme before paint to avoid a light/dark flash.
      (function () {
        try {
          var m = localStorage.getItem('sumly_theme') || 'auto';
          var dark =
            m === 'dark' ||
            (m === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
