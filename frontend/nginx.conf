# nginx config for serving the Sumly SPA and proxying API calls to the backend.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the Go backend service (named "backend" in compose).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint passthrough (handy for debugging).
    location = /health {
        proxy_pass http://backend:8080/health;
    }

    # SPA fallback: serve index.html for any unknown path so client-side
    # routing (react-router) works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
